name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  basic-tests:
    name: Basic Tests (All PHP Versions)
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        php-version: ['7.4', '8.0', '8.1', '8.2']
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ matrix.php-version }}
        extensions: dom, curl, libxml, mbstring, zip, pcntl

    - name: Cache Composer dependencies
      uses: actions/cache@v3
      with:
        path: vendor
        key: composer-${{ hashFiles('composer.lock') }}
        restore-keys: composer-

    - name: Install dependencies
      run: composer install --no-interaction --prefer-dist --optimize-autoloader

    - name: Run basic infrastructure tests (4 tests)
      run: ./vendor/bin/phpunit --configuration phpunit-basic.xml --testsuite basic

    - name: Run comprehensive feature tests (22 tests, 112+ assertions)
      run: ./vendor/bin/phpunit --configuration phpunit-basic.xml --testsuite comprehensive
      
    - name: Verify test results
      run: |
        echo "✅ Basic Tests: 4 tests completed"
        echo "✅ Comprehensive Tests: 22 tests, 112+ assertions completed" 
        echo "✅ All plugin features tested for PHP ${{ matrix.php-version }}"

  advanced-tests:
    name: Integration Tests (WordPress Environment)
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        php-version: ['8.1']
        wordpress-version: ['latest']
    
    services:
      mysql:
        image: mysql:5.7
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: wordpress_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ matrix.php-version }}
        extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, mysql, mysqli, pdo_mysql
        coverage: xdebug

    - name: Cache Composer dependencies
      uses: actions/cache@v3
      with:
        path: vendor
        key: composer-${{ hashFiles('composer.lock') }}
        restore-keys: composer-

    - name: Install dependencies
      run: composer install --no-interaction --prefer-dist --optimize-autoloader

    - name: Install Subversion
      run: sudo apt-get update && sudo apt-get install -y subversion

    - name: Setup WordPress test environment
      run: |
        bash bin/install-wp-tests.sh wordpress_test root password 127.0.0.1:3306 ${{ matrix.wordpress-version }} true

    - name: Run WordPress integration tests
      run: ./vendor/bin/phpunit --testsuite integration

