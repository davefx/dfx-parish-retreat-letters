name: Deploy to WordPress SVN
on:
  workflow_dispatch:
  push:
    tags:
      - "*"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Subversion and Rsync
        run: |
          sudo apt-get update
          sudo apt-get install -y subversion rsync

      - name: Set up variables
        id: vars
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          
          if [[ "$TAG_NAME" == refs/heads/* ]] || [[ "$TAG_NAME" == "main" ]]; then
            TAG_NAME=$(git describe --tags --abbrev=0)
          fi
          
          echo "tag=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "slug=dfx-parish-retreat-letters" >> $GITHUB_OUTPUT 

      - name: Deploy to SVN
        env:
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
          SLUG: ${{ steps.vars.outputs.slug }}
          TAG: ${{ steps.vars.outputs.tag }}
        run: |
          SVN_URL="https://plugins.svn.wordpress.org/$SLUG/"
          SVN_DIR="/tmp/svn-checkout"
          mkdir -p $SVN_DIR
          

          # 1. Checkout Trunk
          echo "Checking out Trunk..."
          svn checkout $SVN_URL $SVN_DIR --username "$SVN_USERNAME" --password "$SVN_PASSWORD" --non-interactive
          

          # 2. Sync and Commit Trunk (Always happens)
          echo "Syncing Trunk..."

          cd $SVN_DIR/trunk

          rsync -avP --delete \
            --exclude='.git*' \
            --exclude='.github*' \
            --exclude='.svn/' \
            --exclude-from="$GITHUB_WORKSPACE/.distignore" \
            "$GITHUB_WORKSPACE/" .


          echo "Trunk synced. Now adding files to subversion"
          svn add --force . --auto-props --parents --depth infinity

          echo "Subversion status after adding files:"
          svn status

          echo "Maybe deleting no-longer existing files"
          svn status | grep '^\!' | awk '{print $2}' | xargs -I% svn rm % --force

          echo "Committing changes in Subversion trunk"
          svn commit -m "Update trunk via GitHub Actions" --username "$SVN_USERNAME" --password "$SVN_PASSWORD" --non-interactive

          # 3. Handle Tag (Only if it DOES NOT exist)
          cd $SVN_DIR
          if svn ls "$SVN_URL/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists in SVN. Skipping tag update to protect historical data."
          else
            echo "Tag $TAG is new. Creating and committing tag..."
            
            # Checkout tags parent (minimal depth)
            svn checkout --depth immediates $SVN_URL/tags $SVN_DIR/tags --username "$SVN_USERNAME" --password "$SVN_PASSWORD" --non-interactive
            mkdir -p "$SVN_DIR/tags/$TAG"
            
            # Sync code to the new tag folder
            rsync -avP --delete \
              --exclude='.git*' \
              --exclude='.github*' \
              --exclude='.svn/' \
              --exclude-from="$GITHUB_WORKSPACE/.distignore" \
              "$GITHUB_WORKSPACE/" "$SVN_DIR/tags/$TAG/"
            
            # Add and Commit the new tag
            cd $SVN_DIR/tags
            svn add $TAG
            cd $TAG
            svn commit -m "Tagging version $TAG" --username "$SVN_USERNAME" --password "$SVN_PASSWORD" --non-interactive
          fi


