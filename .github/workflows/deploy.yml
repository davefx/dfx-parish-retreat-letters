name: Deploy to WordPress SVN
on:
  workflow_dispatch:
  push:
    tags:
      - "*"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Subversion and Rsync
        run: |
          sudo apt-get update
          sudo apt-get install -y subversion rsync

      - name: Set up variables
        id: vars
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          
          if [[ "$TAG_NAME" == refs/heads/* ]] || [[ "$TAG_NAME" == "main" ]]; then
            TAG_NAME=$(git describe --tags --abbrev=0)
          fi
          
          echo "tag=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "slug=dfx-parish-retreat-letters" >> $GITHUB_OUTPUT 

      - name: Deploy to SVN
        env:
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
          SLUG: ${{ steps.vars.outputs.slug }}
          TAG: ${{ steps.vars.outputs.tag }}
        run: |
          SVN_URL="https://plugins.svn.wordpress.org/$SLUG/"
          SVN_DIR="/tmp/svn-checkout"
          
          mkdir -p $SVN_DIR
          
          # 1. Checkout Trunk
          echo "Checking out Trunk..."
          svn checkout $SVN_URL/trunk $SVN_DIR/trunk --username "$SVN_USERNAME" --password "$SVN_PASSWORD" --non-interactive
          
          # 2. Checkout Tag (if exists)
          if svn ls "$SVN_URL/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG exists. Checking it out..."
            svn checkout "$SVN_URL/tags/$TAG" $SVN_DIR/tags/$TAG --username "$SVN_USERNAME" --password "$SVN_PASSWORD" --non-interactive
          else
            echo "Tag $TAG is new. Creating directory..."
            mkdir -p "$SVN_DIR/tags/$TAG"
          fi

          # 3. Sync Trunk (Crucial: Keep .svn folders!)
          echo "Syncing Trunk..."
          rsync -avP --delete \
            --exclude='.git*' \
            --exclude='.github*' \
            --exclude='.svn/' \
            --exclude-from="$GITHUB_WORKSPACE/.distignore" \
            "$GITHUB_WORKSPACE/" "$SVN_DIR/trunk/"

          # 4. Sync Tag (Crucial: Keep .svn folders!)
          echo "Syncing Tag..."
          rsync -avP --delete \
            --exclude='.git*' \
            --exclude='.github*' \
            --exclude='.svn/' \
            --exclude-from="$GITHUB_WORKSPACE/.distignore" \
            "$GITHUB_WORKSPACE/" "$SVN_DIR/tags/$TAG/"

          # 5. Commit Trunk
          echo "Committing Trunk..."
          cd $SVN_DIR/trunk
          svn add --force . --auto-props --parents --depth infinity
          svn status | grep '^\!' | awk '{print $2}' | xargs -I% svn rm % --force
          svn commit -m "Update trunk via GitHub Actions" --username "$SVN_USERNAME" --password "$SVN_PASSWORD" --non-interactive

          # 6. Commit Tag
          echo "Committing Tag $TAG..."
          cd $SVN_DIR/tags/$TAG
          
          # If it's a new tag directory, we need to add it to the tags parent
          if [ ! -d ".svn" ]; then
             # This handles the case where the tag folder is brand new
             cd $SVN_DIR
             svn checkout --depth immediates $SVN_URL/tags tags --username "$SVN_USERNAME" --password "$SVN_PASSWORD" --non-interactive
             cd tags
             svn add $TAG
          fi
          
          svn add --force . --auto-props --parents --depth infinity
          svn status | grep '^\!' | awk '{print $2}' | xargs -I% svn rm % --force
          svn commit -m "Update tag $TAG via GitHub Actions" --username "$SVN_USERNAME" --password "$SVN_PASSWORD" --non-interactive


