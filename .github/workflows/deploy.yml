name: Deploy to WordPress SVN
on:
  workflow_dispatch:
  push:
    tags:
      - "*"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Subversion and Rsync
        run: |
          sudo apt-get update
          sudo apt-get install -y subversion rsync

      - name: Set up variables
        id: vars
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          
          if [[ "$TAG_NAME" == refs/heads/* ]] || [[ "$TAG_NAME" == "main" ]]; then
            TAG_NAME=$(git describe --tags --abbrev=0)
          fi
          
          echo "tag=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "slug=dfx-parish-retreat-letters" >> $GITHUB_OUTPUT 

      - name: Deploy to SVN
        env:
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
          SLUG: ${{ steps.vars.outputs.slug }}
          TAG: ${{ steps.vars.outputs.tag }}
        run: |
          SVN_URL="https://plugins.svn.wordpress.org/$SLUG/"
          SVN_DIR="/tmp/svn-checkout"
          
          # 1. Checkout with full depth for both trunk and the specific tag
          # This is the only way to avoid "out of date" errors
          mkdir -p $SVN_DIR
          svn checkout $SVN_URL/trunk $SVN_DIR/trunk --username "$SVN_USERNAME" --password "$SVN_PASSWORD" --non-interactive
          
          # Check if tag exists on server
          if svn ls "$SVN_URL/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG exists. Checking it out..."
            svn checkout "$SVN_URL/tags/$TAG" "$SVN_DIR/tags/$TAG" --username "$SVN_USERNAME" --password "$SVN_PASSWORD" --non-interactive
          else
            echo "Tag $TAG is new. Creating directory..."
            mkdir -p "$SVN_DIR/tags/$TAG"
          fi

          # 2. Sync Trunk
          rsync -avP --delete \
            --exclude='.git*' \
            --exclude='.github*' \
            --exclude-from="$GITHUB_WORKSPACE/.distignore" \
            "$GITHUB_WORKSPACE/" "$SVN_DIR/trunk/"

          # 3. Sync Tag
          rsync -avP --delete \
            --exclude='.git*' \
            --exclude='.github*' \
            --exclude-from="$GITHUB_WORKSPACE/.distignore" \
            "$GITHUB_WORKSPACE/" "$SVN_DIR/tags/$TAG/"

          # 4. Process changes for SVN
          cd $SVN_DIR
          
          # Add new files and remove deleted ones
          # This handles files already under version control correctly
          svn add --force . --auto-props --parents --depth infinity
          svn status | grep '^\!' | awk '{print $2}' | xargs -I% svn rm % --force

          # 5. Final Commit
          svn commit -m "Updating version $TAG via GitHub Actions" \
            --username "$SVN_USERNAME" \
            --password "$SVN_PASSWORD" \
            --non-interactive


