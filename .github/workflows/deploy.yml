name: Deploy to WordPress SVN
on:
  workflow_dispatch:
  push:
    tags:
      - "*"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout my Git code
        uses: actions/checkout@v4

      - name: Install Subversion
        run: |
          sudo apt-get update
          sudo apt-get install -y subversion rsync

      - name: Configure variables
        id: vars
        run: |
          echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          echo "slug=dfx-parish-retreat-letters" >> $GITHUB_OUTPUT

      - name: Deploy to SVN
        env:
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
          SLUG: ${{ steps.vars.outputs.slug }}
          TAG: ${{ steps.vars.outputs.tag }}
        run: |
          SVN_URL="https://plugins.svn.wordpress.org/$SLUG/"
          SVN_DIR="/tmp/svn-checkout"
          
          svn checkout --depth immediates $SVN_URL $SVN_DIR
          cd $SVN_DIR
          
          svn update --set-depth infinity trunk
          mkdir -p tags/$TAG

          rsync -avP --delete \
            --exclude='.git*' \
            --exclude='.github*' \
            --exclude-from="$GITHUB_WORKSPACE/.distignore" \
            "$GITHUB_WORKSPACE/" "$SVN_DIR/trunk/"

          rsync -avP --delete \
            --exclude='.git*' \
            --exclude='.github*' \
            --exclude-from="$GITHUB_WORKSPACE/.distignore" \
            "$GITHUB_WORKSPACE/" "$SVN_DIR/tags/$TAG/"

          svn add --force . --auto-props --parents --depth infinity
          svn status | grep '^\!' | sed 's/! *//' | xargs -I% svn rm %

          cd $SVN_DIR
          svn status | grep '^\!' | awk '{print $2}' | xargs -I% svn rm % --force

          svn commit -m "Versión $TAG desde GitHub Actions" \
            --username "$SVN_USERNAME" \
            --password "$SVN_PASSWORD" \
            --non-interactive



