name: Deploy to WordPress SVN
on:
  workflow_dispatch:
  push:
    tags:
      - "*"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Subversion and Rsync
        run: |
          sudo apt-get update
          sudo apt-get install -y subversion rsync

      - name: Set up variables
        id: vars
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          
          if [[ "$TAG_NAME" == refs/heads/* ]] || [[ "$TAG_NAME" == "main" ]]; then
            TAG_NAME=$(git describe --tags --abbrev=0)
          fi
          
          echo "tag=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "slug=dfx-parish-retreat-letters" >> $GITHUB_OUTPUT 

      - name: Deploy to SVN
        env:
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
          SLUG: ${{ steps.vars.outputs.slug }}
          TAG: ${{ steps.vars.outputs.tag }}
        run: |
          SVN_URL="https://plugins.svn.wordpress.org/$SLUG/"
          SVN_DIR="/tmp/svn-checkout"
          
          # 1. Checkout metadata only
          svn checkout --depth immediates $SVN_URL $SVN_DIR
          cd $SVN_DIR
          
          # 2. Update trunk and tags folder metadata
          svn update --set-depth infinity trunk
          svn update --set-depth immediates tags

          # 3. Sync GitHub code to Trunk first
          rsync -avP --delete \
            --exclude='.git*' \
            --exclude='.github*' \
            --exclude-from="$GITHUB_WORKSPACE/.distignore" \
            "$GITHUB_WORKSPACE/" "$SVN_DIR/trunk/"

          # 4. Handle Tag: Delete local copy and recreate from trunk
          if [ -d "tags/$TAG" ]; then
            echo "Tag $TAG exists locally, refreshing it..."
            rm -rf "tags/$TAG"
          fi
          
          # Copy trunk to tag locally
          cp -r trunk "tags/$TAG"

          # 5. Add all changes and handle deletions
          svn add --force . --auto-props --parents --depth infinity
          
          # Fix for "out of date" / "already exists" errors: 
          # This ensures SVN recognizes the files correctly
          svn status | grep '^\!' | awk '{print $2}' | xargs -I% svn rm % --force

          # 6. Commit
          svn commit -m "Update version $TAG via GitHub Actions" \
            --username "$SVN_USERNAME" \
            --password "$SVN_PASSWORD" \
            --non-interactive

